<!DOCTYPE html>

<head>

  <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/aos/aos.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="{% static 'assets/css/main.css' %}" rel="stylesheet">

  <div id="google_translate_element" style="display:none;"></div>

  <script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'mr',
    autoDisplay: false
  }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

 
</head>
<body>
    <!-- ======= Header ======= -->
   <div class="ev-topbar">
 
    <a class="ev-logo" href="{% url 'home' %}">
      <div class="ev-logo-icon">
        
        <i class="bi bi-house-heart-fill"></i>
      </div>
      <span class="ev-logo-name">My e<span class="ev-logo-accent">Village</span></span>
    </a>
 
    <ul class="ev-nav">
 
      <li class="ev-nav-item">
        <a class="ev-nav-link ev-active" href="{% url 'home' %}">Home</a>
      </li>
 
      <li class="ev-nav-item">
        <a class="ev-nav-link" href="{% url 'about' %}">About village</a>
      </li>
 
      <li class="ev-nav-item ev-has-dropdown">
        <span class="ev-nav-trigger">
          Services
          <i class="bi bi-arrow-down"></i>
        </span>
        <div class="ev-dropdown">
          <a class="ev-dropdown-link" href="{% url 'education' %}">
            <div class="ev-dropdown-icon dd-edu">
              <i class="bi bi-journal-text"></i>
            </div>
            Education support
          </a>
          <a class="ev-dropdown-link" href="{% url 'agriculture' %}">
            <div class="ev-dropdown-icon dd-agri">
              <i class="bi bi-leaf"></i>
            </div>
            Agriculture
          </a>
        </div>
      </li>
 
      <li class="ev-nav-item">
        <a class="ev-nav-link" href="{% url 'infrastructure' %}">Infrastructure</a>
      </li>
 
      <li class="ev-nav-item">
        <a class="ev-nav-link" href="{% url 'economy' %}">Economy</a>
      </li>
 
    </ul>
 
    <div class="ev-nav-right">
 
      <div class="ev-lang">
        <button class="ev-lang-btn ev-lang-active" id="evLangEn">EN</button>
        <button class="ev-lang-btn" id="evLangMr">मरा</button>
      </div>
 
      <div class="ev-nav-sep"></div>
 
      <a class="ev-btn-contact" href="{% url 'contact' %}">Contact</a>
 
    </div>
 
    <button class="ev-hamburger" id="evHamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
 
  </div>
 
  <!-- Mobile nav drawer -->
  <div class="ev-mobile-nav" id="evMobileNav">
    <a class="ev-mobile-link" href="{% url 'home' %}">Home</a>
    <a class="ev-mobile-link" href="{% url 'about' %}">About village</a>
    <a class="ev-mobile-link" href="{% url 'education' %}">Education support</a>
    <a class="ev-mobile-link" href="{% url 'agriculture' %}">Agriculture</a>
    <a class="ev-mobile-link" href="{% url 'infrastructure' %}">Infrastructure</a>
    <a class="ev-mobile-link" href="{% url 'economy' %}">Economy</a>
    <a class="ev-mobile-link" href="{% url 'contact' %}">Contact</a>
    <div class="ev-mobile-lang">
      <button class="ev-lang-btn ev-lang-active" id="evMobLangEn">EN</button>
      <button class="ev-lang-btn" id="evMobLangMr">मरा</button>
    </div>
  </div>

  <script>
    const ham = document.getElementById('evHamburger');
    const mob = document.getElementById('evMobileNav');
    if (ham) ham.addEventListener('click', () => {
      mob.classList.toggle('ev-mobile-nav--open');
      ham.classList.toggle('ev-hamburger--open');
    });

    function makeLangToggle(a, b) {
      const btnA = document.getElementById(a);
      const btnB = document.getElementById(b);
      if (!btnA || !btnB) return;
      [btnA, btnB].forEach(btn => btn.addEventListener('click', () => {
        btnA.classList.toggle('ev-lang-active');
        btnB.classList.toggle('ev-lang-active');
      }));
    }
    makeLangToggle('evLangEn', 'evLangMr');
    makeLangToggle('evMobLangEn', 'evMobLangMr');


     function translateTo(lang) {
  const select = document.querySelector(".goog-te-combo");
  if (!select) return;

  select.value = lang;
  select.dispatchEvent(new Event("change"));
}

document.getElementById("evLangEn").onclick = () => translateTo("en");


  </script>
 
  

</body>
</html>
